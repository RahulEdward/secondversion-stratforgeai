<section>
  <h2>Headline metrics</h2>
  <div class="grid-2">
    <div class="panel">
      <h3 style="margin-top:0">Performance</h3>
      <table class="kv">
        {% for label, value in metric_rows %}
        <tr><th>{{ label }}</th><td>{{ value }}</td></tr>
        {% endfor %}
      </table>
    </div>
    <div class="panel">
      <h3 style="margin-top:0">Statistical significance</h3>
      <table class="kv">
        {% for label, value in sig_rows %}
        <tr><th>{{ label }}</th><td>{{ value }}</td></tr>
        {% endfor %}
      </table>
      <p class="muted" style="font-size:11px; margin:12px 0 0;">
        One-sided t-test on per-trade returns against H₀: mean ≤ 0.
      </p>
    </div>
  </div>
</section>
