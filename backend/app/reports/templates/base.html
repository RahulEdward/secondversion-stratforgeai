<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ spec_name }} — Backtest Report</title>
<script src="{{ plotly_cdn }}" charset="utf-8"></script>
<style>
  :root {
    --bg: {{ theme.bg }};
    --panel: {{ theme.panel }};
    --text: {{ theme.text }};
    --muted: {{ theme.muted }};
    --accent: {{ theme.accent }};
    --good: {{ theme.good }};
    --bad: {{ theme.bad }};
    --grid: {{ theme.grid }};
    --grade: {{ grade_color }};
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .report {
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  /* Cover --------------------------------------------------------- */
  .cover {
    border-bottom: 1px solid var(--grid);
    padding-bottom: 28px;
    margin-bottom: 32px;
  }
  .cover .brand {
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 11px;
    margin-bottom: 8px;
  }
  .cover h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--text);
  }
  .cover .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 18px;
  }
  .cover .grade-badge {
    display: inline-block;
    background: var(--grade);
    color: #0a0a0a;
    padding: 6px 14px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    margin-right: 10px;
  }
  .cover .verdict-badge {
    display: inline-block;
    padding: 6px 12px;
    border: 1px solid var(--grade);
    color: var(--grade);
    border-radius: 4px;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .cover .headline {
    margin-top: 16px;
    color: var(--text);
    font-size: 14px;
  }

  /* Sections ------------------------------------------------------ */
  section {
    margin-bottom: 36px;
  }
  section h2 {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--grid);
  }
  section h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 20px 0 8px;
    color: var(--text);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 6px;
    padding: 18px 20px;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Tables --------------------------------------------------------- */
  table.kv {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.kv th, table.kv td {
    text-align: left;
    padding: 7px 0;
    border-bottom: 1px solid var(--grid);
  }
  table.kv th {
    color: var(--muted);
    font-weight: 500;
    width: 55%;
  }
  table.kv td {
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  table.kv tr:last-child th, table.kv tr:last-child td {
    border-bottom: none;
  }

  table.rows {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 8px;
  }
  table.rows th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 7px 10px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--grid);
  }
  table.rows td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--grid);
    font-variant-numeric: tabular-nums;
  }
  table.rows tr:hover td {
    background: rgba(200, 155, 110, 0.04);
  }
  .num-pos { color: var(--good); }
  .num-neg { color: var(--bad); }

  .chip {
    display: inline-block;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-family: 'JetBrains Mono', Menlo, monospace;
  }
  .chip + .chip { margin-left: 4px; }

  /* Figures -------------------------------------------------------- */
  .fig {
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 6px;
    padding: 12px;
    margin-top: 12px;
  }

  /* Verdict block -------------------------------------------------- */
  .verdict-block {
    background: var(--panel);
    border-left: 4px solid var(--grade);
    padding: 20px 24px;
    border-radius: 0 6px 6px 0;
  }
  .verdict-block .score-big {
    font-size: 40px;
    font-weight: 700;
    color: var(--grade);
    line-height: 1;
    margin-bottom: 4px;
  }
  .verdict-block .grade-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .verdict-block .confidence {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--grid);
    color: var(--muted);
  }
  .veto-list {
    list-style: none;
    padding: 0;
    margin: 8px 0 0;
  }
  .veto-list li {
    padding: 6px 10px;
    background: rgba(239, 68, 68, 0.08);
    border-left: 2px solid var(--bad);
    margin-bottom: 4px;
    font-size: 13px;
    color: var(--text);
  }
  .notes-list {
    list-style: none;
    padding: 0;
    margin: 8px 0 0;
    font-size: 12px;
    color: var(--muted);
  }
  .notes-list li {
    padding: 3px 0;
  }

  /* Spec dump ------------------------------------------------------ */
  pre.spec {
    background: var(--bg);
    border: 1px solid var(--grid);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    overflow-x: auto;
    max-height: 340px;
  }

  .muted { color: var(--muted); }
  .footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--grid);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  @media print {
    body { background: var(--bg); }
    .report { padding: 24px 20px; max-width: none; }
    section { page-break-inside: avoid; }
    .fig { page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="report">
{% block content %}{% endblock %}
<div class="footer">
  StratForge AI · Report {{ report_id }} · Generated {{ generated_at }}
</div>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
